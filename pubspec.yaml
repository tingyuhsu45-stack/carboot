name: carboot_finder
description: A Flutter app for discovering car boot sales in London

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # UI
  cupertino_icons: ^1.0.2

  # Map (Free OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # HTTP for future API calls
  http: ^1.1.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
